<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calipso Dashboard</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-ws@2.0.3/ws.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            background: #f5f5f5;
            color: #1a1a1a;
            overflow: hidden;
        }

        /* Activity Bar */
        #activity-bar {
            width: 48px;
            min-width: 48px;
            background: #252526;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 0.5rem;
            gap: 0.25rem;
            border-right: 1px solid #1a1a1a;
        }
        #activity-bar button {
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            border-left: 2px solid transparent;
            color: #858585;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0;
            transition: color 0.15s;
            position: relative;
        }
        #activity-bar button .badge {
            display: none;
            position: absolute;
            top: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2563eb;
        }
        #activity-bar button .badge.visible {
            display: block;
        }
        #activity-bar button:hover {
            color: #e0e0e0;
        }
        #activity-bar button.active {
            color: #fff;
            border-left-color: #2563eb;
        }

        /* Side Panel */
        #side-panel {
            width: 320px;
            min-width: 320px;
            background: #fff;
            border-right: 1px solid #ddd;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
        }
        #side-panel.hidden {
            display: none;
        }
        .panel-widget {
            display: none;
            flex: 1;
            overflow-y: auto;
        }
        .panel-widget.active {
            display: block;
        }

        /* Chat Area */
        #chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        #main {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        #input-area {
            padding: 1rem;
            border-top: 1px solid #ddd;
            background: #fff;
        }
        #input-area form {
            display: flex;
            width: 100%;
        }
        #input-area fieldset {
            display: flex;
            gap: 0.5rem;
            flex: 1;
            border: none;
            padding: 0;
            margin: 0;
        }
        #input-area input[type="text"] {
            flex: 1;
            padding: 0.5rem 0.75rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
        }
        #input-area button {
            padding: 0.5rem 1.25rem;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
        }
        #input-area button:hover { background: #1d4ed8; }
        #input-area fieldset:disabled input,
        #input-area fieldset:disabled button {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Widget common styles */
        .widget {
            margin-bottom: 1rem;
            padding: 0.75rem;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background: #fff;
        }
        .widget h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
            margin-bottom: 0.5rem;
        }
        .widget pre {
            white-space: pre-wrap;
            font-size: 0.85rem;
            color: #444;
            background: #f0f0f0;
            padding: 0.5rem;
            border-radius: 4px;
            overflow-x: auto;
        }
        .widget code {
            font-size: 0.85rem;
            background: #f0f0f0;
            padding: 0.1rem 0.3rem;
            border-radius: 3px;
        }
        .widget pre code { background: none; padding: 0; }
        .widget ul, .widget ol { padding-left: 1.5rem; }
        .widget ul { list-style: none; padding: 0; }
        .widget li { padding: 0.25rem 0; font-size: 0.9rem; }
        .widget p { margin: 0.25rem 0; }
        .widget table {
            border-collapse: collapse;
            margin: 0.5rem 0;
        }
        .widget th, .widget td {
            border: 1px solid #ddd;
            padding: 0.3rem 0.5rem;
            font-size: 0.85rem;
        }

        /* Task styles */
        .task-done label { text-decoration: line-through; color: #999; }
        .task-in_progress label { color: #b45309; }

        /* Turn styles */
        .turn { padding: 0.3rem 0; }
        .turn-sep {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 0.5rem 0;
        }

        /* Message styles */
        .msg {
            padding: 0.4rem 0.6rem;
            font-size: 0.9rem;
            border-radius: 8px;
            margin: 0.25rem 0;
            max-width: 80%;
            background: #f3f4f6;
        }
        .msg .bubble-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #888;
            margin-bottom: 0.15rem;
        }
        .msg.sent {
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }
        .msg.received {
            margin-right: auto;
            border-bottom-left-radius: 2px;
        }
        .msg.summary {
            color: #666;
            font-style: italic;
            font-size: 0.85rem;
            margin-right: auto;
        }
        .msg.tool-call, .msg.tool-result {
            max-width: 100%;
        }
        .msg.tool-call {
            background: #f0fdf4;
            border-left: 3px solid #16a34a;
        }
        .msg.tool-result {
            background: #eff6ff;
            border-left: 3px solid #2563eb;
        }
        .msg .dir {
            display: inline-block;
            width: 1em;
            font-size: 0.7rem;
        }
        .msg.tool-call .dir { color: #16a34a; }
        .msg.tool-result .dir { color: #2563eb; }
        .msg.tool-call code, .msg.tool-result code {
            font-size: 0.8rem;
            color: #666;
        }

        /* Collapsible tool groups */
        .tool-group {
            margin: 0.25rem 0 0.25rem 1.2rem;
            border-left: 2px solid #d1d5db;
            padding-left: 0.5rem;
        }
        .tool-group > summary {
            cursor: pointer;
            font-size: 0.85rem;
            color: #666;
            font-style: italic;
            padding: 0.2rem 0;
            user-select: none;
        }
        .tool-group > summary:hover { color: #333; }
        .tool-group .msg {
            margin-left: 0;
        }

        /* Goal edit */
        .goal-edit {
            display: flex;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }
        .goal-edit .goal-input {
            flex: 1;
            padding: 0.3rem 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .goal-edit button, .btn-remove {
            padding: 0.2rem 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f5f5f5;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .goal-edit button:hover, .btn-remove:hover {
            background: #e5e5e5;
        }

        /* Thinking indicator */
        #thinking {
            display: none;
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem;
            color: #666;
        }
        #thinking.active {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        #thinking .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #2563eb;
            animation: pulse 1.2s ease-in-out infinite;
        }
        #thinking .dot:nth-child(2) { animation-delay: 0.2s; }
        #thinking .dot:nth-child(3) { animation-delay: 0.4s; }

        /* Code panel widget styles */
        .file-entry {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.3rem 0.5rem;
            margin-bottom: 0.25rem;
            background: #f0f0f0;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .file-entry code {
            background: none;
            padding: 0;
            font-weight: 500;
        }
        .panel-widget pre {
            max-height: 60vh;
            overflow-y: auto;
            font-size: 0.8rem;
            line-height: 1.4;
        }

        /* File Explorer directory listing */
        .dir-listing {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 0.85rem;
        }
        .dir-listing li {
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            cursor: default;
        }
        .dir-listing li:hover { background: #f0f0f0; }
        .dir-listing .entry-dir { font-weight: 500; }
        .dir-listing .entry-file { color: #555; }
    </style>
</head>
<body hx-ext="ws" ws-connect="/ws">
    <div id="activity-bar">
        <button data-panel="widget-system-prompt" title="System Prompt">&#9881;<span class="badge"></span></button>
        <button data-panel="widget-agents-md" title="Agents">&#128196;<span class="badge"></span></button>
        <button data-panel="widget-goal" title="Goal">&#127919;<span class="badge"></span></button>
        <button data-panel="widget-task-list" title="Tasks">&#9745;<span class="badge"></span></button>
        <button data-panel="widget-file-explorer" title="Files">&#128193;<span class="badge"></span></button>
        <button data-panel="widget-code-explorer" title="Code">&#128270;<span class="badge"></span></button>
    </div>
    <div id="side-panel" class="hidden">
        <div class="panel-widget" data-for="widget-system-prompt">
            <div id="widget-system-prompt" class="widget"><h3>System Prompt</h3></div>
        </div>
        <div class="panel-widget" data-for="widget-agents-md">
            <div id="widget-agents-md" class="widget"><h3>AGENTS.md</h3></div>
        </div>
        <div class="panel-widget" data-for="widget-goal">
            <div id="widget-goal" class="widget"><h3>Goal</h3></div>
        </div>
        <div class="panel-widget" data-for="widget-task-list">
            <div id="widget-task-list" class="widget"><h3>Tasks</h3></div>
        </div>
        <div class="panel-widget" data-for="widget-file-explorer">
            <div id="widget-file-explorer" class="widget"><h3>File Explorer</h3><p><em>No file open</em></p></div>
        </div>
        <div class="panel-widget" data-for="widget-code-explorer">
            <div id="widget-code-explorer" class="widget"><h3>Code Explorer</h3><p><em>No files open</em></p></div>
        </div>
    </div>
    <div id="chat-area">
        <div id="main">
            <div id="widget-conversation-log" class="widget"><h3>Conversation</h3></div>
            <div id="thinking">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
                <span>Thinking...</span>
            </div>
        </div>
        <div id="input-area">
            <form ws-send>
                <fieldset id="input-fieldset">
                    <input type="text" name="user_input" placeholder="Type a message..." autocomplete="off" />
                    <button type="submit">Send</button>
                </fieldset>
            </form>
        </div>
    </div>
    <script>
        /* Indeterminate checkbox support */
        function setIndeterminate() {
            document.querySelectorAll('[data-indeterminate]').forEach(function(cb) {
                cb.indeterminate = true;
            });
        }
        document.body.addEventListener('htmx:oobAfterSwap', setIndeterminate);
        document.body.addEventListener('htmx:wsAfterMessage', setIndeterminate);

        /* WebSocket reference for widget events */
        var _calipsoWs = null;
        document.body.addEventListener('htmx:wsOpen', function(e) {
            _calipsoWs = e.detail.socketWrapper;
        });
        function sendWidgetEvent(toolName, args) {
            if (_calipsoWs) {
                _calipsoWs.sendImmediately(JSON.stringify({
                    widget_event: {tool_name: toolName, args: args}
                }));
            }
        }

        /* Notification badges on OOB widget updates.
           Skip the first full WS message (initial state) — only badge on subsequent updates. */
        var _wsMessageCount = 0;
        document.body.addEventListener('htmx:wsAfterMessage', function() {
            _wsMessageCount++;
        });
        document.body.addEventListener('htmx:oobAfterSwap', function(e) {
            if (_wsMessageCount <= 1) return;
            var id = e.detail.target && e.detail.target.id;
            if (!id || id === 'widget-conversation-log') return;
            /* Don't badge if this tab is currently open */
            if (activePanel === id) return;
            var btn = document.querySelector('#activity-bar button[data-panel="' + id + '"]');
            if (btn) btn.querySelector('.badge').classList.add('visible');
        });

        /* Activity bar toggle logic */
        var activePanel = null;
        function getWrapper(panelId) {
            return document.querySelector('.panel-widget[data-for="' + panelId + '"]');
        }
        document.getElementById('activity-bar').addEventListener('click', function(e) {
            var btn = e.target.closest('button[data-panel]');
            if (!btn) return;
            var panelId = btn.getAttribute('data-panel');
            var sidePanel = document.getElementById('side-panel');

            if (activePanel === panelId) {
                /* Close panel */
                btn.classList.remove('active');
                sidePanel.classList.add('hidden');
                getWrapper(panelId).classList.remove('active');
                activePanel = null;
            } else {
                /* Deactivate previous */
                if (activePanel) {
                    document.querySelector('#activity-bar button.active').classList.remove('active');
                    getWrapper(activePanel).classList.remove('active');
                }
                /* Activate new */
                btn.classList.add('active');
                btn.querySelector('.badge').classList.remove('visible');
                sidePanel.classList.remove('hidden');
                getWrapper(panelId).classList.add('active');
                activePanel = panelId;
            }
        });
    </script>
</body>
</html>
